<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Records</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background-color:#18085f;
    color:white;
    display:flex;
}

main{
    flex:1;
    padding:40px;
}

nav{
    width:220px;
    height:100vh;
    background:#2a0b53;
    padding:20px;
}

nav ul{
    list-style:none;
    padding:0;
}

nav ul li{
    margin:15px 0;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:bold;
}

nav a:hover{
    color:#38bdf8;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#2c1c46;
    padding:25px;
    border-radius:10px;
}

.upload-box{
    border:2px dashed #7e2424;
    padding:20px;
    text-align:center;
    border-radius:10px;
    margin-top:15px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    background:#ffffff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#viewer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    text-align:center;
}

#viewer img{
    margin-top:5%;
    max-width:80%;
    border-radius:10px;
}

#close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:30px;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<main>

<h1>School Records</h1>

<div class="grid">

<div class="card">
<h2>Quizzes</h2>
    
<img id="myImage" src="quiz2.jpg" style="display:none;"
    height="120px;" width="120px;">
<button onclick="toggleImage()">Quiz 1</button>

<script>
function toggleImage() {
  const img = document.getElementById("myImage");

  if (img.style.display === "none") {
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }
}
</script>
    
<img id="myImage" src="quiz3.jpg" style="display:none;"
    height="120px;" width="120px;">
<button onclick="openViewer()">Quiz 3</button>

<script>

function openViewer(src){
    document.getElementById("viewer").style.display = "block";
    document.getElementById("viewerImg").src = src;
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}
</script>
    
<div class="upload-box">
<p>Upload your quiz</p>
<input type="file">
</div>
</div>

<div class="card">
<h2>Exams</h2>
<div class="upload-box">
<p>Upload your exam</p>
<input type="file">
<br>
<button>Upload Exam</button>
</div>
</div>

<div class="card">
<h2>Activities</h2>
<button onclick="openViewer('act1.jpg')">Activity 1</button>

<div class="upload-box">
<p>Upload your activity</p>
<input type="file">
<br>
<button>Upload Activity</button>
</div>
</div>

</div>

</main>

<nav>
<h2>My Portfolio</h2>
<ul>
<li><a href="index.html">Home</a></li>
</ul>
</nav>

<div id="viewer">
<span id="close" onclick="closeViewer()">&times;</span>
<img id="viewerImg">
</div>

<script>

function openViewer(src){
    document.getElementById("viewer").style.display = "block";
    document.getElementById("viewerImg").src = src;
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>
