<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Records</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background-color:#18085f;
    color:white;
}



header{
    background:#2a0b53;
    padding:15px 40px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:bold;
}

nav a:hover{
    color:#38bdf8;
}


main{
    padding:40px;
}



.card{
    background:#2c1c46;
    padding:30px;
    border-radius:10px;
    max-width:800px;
    margin:auto;
    margin-bottom:30px;
}



.upload-box{
    border:2px dashed #7e2424;
    padding:30px;
    text-align:center;
    border-radius:10px;
    margin-top:15px;
}

button{
    margin-top:10px;
    padding:8px 20px;
    background:#ffffff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}



.activity{
    background:#7e2424;
    padding:15px;
    margin-top:10px;
    border-radius:8px;
}

</style>
</head>

<body>

<header>
<nav>

<h2>My Portfolio</h2>

<ul>
<li><a href="index.html">Home</a></li>
</ul>

</nav>
</header>

<main>



<div class="card">

<h2> Quizzes</h2>
<button onclick="openViewer('quiz2.jpg')">Quiz 1</button>
<button onclick="openViewer('quiz3.jpg')">Quiz 2</button>
      
<div class="upload-box">
<p>Upload your quiz</p>
<input type="file">
<br>

</div>

</div>



<div class="card">

<h2>Exams</h2>

<div class="upload-box">
<p>Upload your exam</p>
<input type="file">
<br>
<button>Upload Exam</button>
</div>

</div>



<div class="card">

<h2> Activities</h2>

<button onclick="openViewer('act1.jpg')" id="act1">Activity 1</button>
    <p>Upload your exam</p>
<input type="file">
<br>
<button>Upload Activity</button>


</div>

</main>
<script>
    function openViewer(){
        document.getElementById('act1').log=
    }
</script>

</body>
</html>
